services:
  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    image: django/app
    container_name: django-app
    hostname: django-app
    networks:
      - django_internal
    ports:
      - 127.0.0.1:8000:8000
      - 127.0.0.1:8001:8001
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ENVIRONMENT=development
      - POSTGRES_DB=wfs
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres

  db:
    image: postgres:17-alpine
    container_name: wfs-db
    hostname: wfs-db
    networks:
      - django_internal
    ports:
      - 127.0.0.1:5432:5432
    environment:
      - POSTGRES_DB=wfs
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  django_internal:
    name: django_internal