services:
  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    image: django/app
    container_name: django-app
    hostname: django-app
    networks:
      - django_internal
    ports:
      - 127.0.0.1:8000:8000
      - 127.0.0.1:8001:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=config.postgres
      - SECRET_KEY=${SECRET_KEY:-VKnroLzyyjvUk316fuyY2vO8jnrP6obbEjH75PGESQpf2Zwu2SJkGUme1cRj67Hz}
      - TLS_ENABLE=0
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-a0tObtQBvNhQjRSbPRZrIkXiooIH2ucIZJeESrRcIFyYOtSV8FKWrAri8djp3CQd}
      - POSTGRES_DB=weather_forecast_service
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=postgres
      - REDIS_HOST=redis
    volumes:
       - ./app:/app
       - ./docs:/app/docs

  postgres:
    image: postgres:17-alpine
    container_name: django-postgres
    hostname: django-postgres
    networks:
      - django_internal
    ports:
      - 127.0.0.1:5432:5432
    environment:
      - POSTGRES_DB=weather_forecast_service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: django-redis
    hostname: django-redis
    networks:
      - django_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  django_internal:
    name: django_internal
